version: "2"
linters:
  enable:
    - mylinter
  settings:
    custom:
      mylinter:
        type: goplugin
        path: ./plugin/mylinter.so
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
